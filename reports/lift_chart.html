<!doctype html><html lang="zh"><head><meta charset="utf-8">
<style>
 *{margin:0;padding:0;box-sizing:border-box}
 body{background:#0a0a0b;font:14px/1.5 -apple-system,'Segoe UI','PingFang SC','Microsoft YaHei',sans-serif;color:#fafaf9}
 .c{width:960px;padding:34px 36px 30px}
 .title{font-size:24px;font-weight:840;letter-spacing:-.02em}
 .title b{color:#fb923c}
 .sub{font-size:13.5px;color:#a1a1aa;margin-top:7px}
 .legend{display:flex;gap:20px;margin:18px 0 22px;font-size:13px;color:#a1a1aa}
 .legend i{width:13px;height:13px;border-radius:50%;display:inline-block;margin-right:7px;vertical-align:-2px}
 .rows{display:flex;flex-direction:column;gap:3px}
 .row{display:grid;grid-template-columns:118px 1fr 78px;align-items:center;gap:14px;padding:9px 0;border-top:1px solid rgba(255,255,255,.07)}
 .row.tot{border-top:1.5px solid rgba(251,146,60,.4);margin-top:6px;padding-top:14px}
 .rl{font-size:14px;color:#e7e5e4;font-weight:600}
 .row.tot .rl{color:#fb923c;font-weight:800}
 .track{position:relative;height:34px}
 .grid{position:absolute;inset:0}
 .grid span{position:absolute;top:0;bottom:0;width:1px;background:rgba(255,255,255,.05)}
 .bar{position:absolute;top:50%;transform:translateY(-50%);height:5px;border-radius:3px;background:linear-gradient(90deg,#52525b,#fb923c)}
 .dot{position:absolute;top:50%;transform:translate(-50%,-50%);border-radius:50%}
 .dot.b{width:12px;height:12px;background:#0a0a0b;border:2.5px solid #71717a}
 .dot.s{width:16px;height:16px;background:#fb923c;box-shadow:0 0 14px rgba(251,146,60,.6)}
 .row.tot .dot.s{width:18px;height:18px}
 .pv{position:absolute;top:-2px;transform:translateX(-50%);font-size:11px;color:#71717a}
 .pv.s{color:#fde9d6;font-weight:700;top:auto;bottom:-3px}
 .lift{font-size:14px;font-weight:800;color:#34d399;text-align:right}
 .row.tot .lift{color:#fb923c}
 .ax{display:grid;grid-template-columns:118px 1fr 78px;gap:14px;margin-top:8px}
 .ax .a{position:relative;height:14px;font-size:10px;color:#52525b}
 .ax .a span{position:absolute;transform:translateX(-50%)}
 .foot{margin-top:18px;font-size:12px;color:#52525b;line-height:1.7}
 .foot b{color:#71717a}
</style></head>
<body><div class="c">
 <div class="title">装上 <b>spine</b>，Sonnet 在 5 个方向全部提升</div>
 <div class="sub">同一个 Sonnet，开 / 关 spine。留出题盲评（spine 从没见过的新题），n=12 / 方向，位置轮换。</div>
 <div class="legend">
  <span><i style="background:#0a0a0b;border:2.5px solid #71717a"></i>裸 Sonnet</span>
  <span><i style="background:#fb923c"></i>Sonnet + spine</span>
 </div>
 <div class="rows" id="rows"></div>
 <div class="ax"><div></div><div class="a" id="ax"></div><div></div></div>
 <div class="foot"><b>spine (骨气)</b> · 控制了模型变量的纯增益——不是换了更强的模型，是同一个模型行为变好了。留出新题盲评，n=12 / 方向，位置轮换，Sonnet 高强度裁判。</div>
</div>
<script>
 const D=[['反驳错误前提',67,100],['破认知天花板',8,42],['该刹车',83,100],['精简代码',83,92],['去 AI 腔',42,92],['综合',57,85]];
 const pct=v=>v+'%';
 document.getElementById('rows').innerHTML=D.map((d,i)=>{
  const tot=d[0]==='综合';
  let g=''; for(let x=0;x<=100;x+=25)g+='<span style="left:'+x+'%"></span>';
  return '<div class="row'+(tot?' tot':'')+'"><div class="rl">'+d[0]+'</div>'+
   '<div class="track"><div class="grid">'+g+'</div>'+
   '<div class="bar" style="left:'+d[1]+'%;width:'+(d[2]-d[1])+'%"></div>'+
   '<div class="dot b" style="left:'+d[1]+'%"></div>'+
   '<div class="pv" style="left:'+d[1]+'%">'+pct(d[1])+'</div>'+
   '<div class="dot s" style="left:'+d[2]+'%"></div>'+
   '<div class="pv s" style="left:'+d[2]+'%">'+pct(d[2])+'</div></div>'+
   '<div class="lift">+'+(d[2]-d[1])+'pt</div></div>';
 }).join('');
 let ax=''; for(let x=0;x<=100;x+=25)ax+='<span style="left:'+x+'%">'+x+'%</span>';
 document.getElementById('ax').innerHTML=ax;
</script>
</body></html>
